services:
  - type: web
    name: urban-mobility-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEVICE
        value: cpu
      - key: LOG_LEVEL
        value: info
      - key: OSRM_BASE_URL
        value: https://router.project-osrm.org
      - key: QDRANT_HOST
        value: localhost
      - key: QDRANT_PORT
        value: "6333"
      - key: SERVICE_AREA_ENABLED
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
